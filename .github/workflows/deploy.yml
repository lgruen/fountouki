name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token + the OIDC id-token Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight Pages deploy; let a running one finish.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Native deps for the build toolchain (linker / alsa headers etc.).
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev pkg-config xvfb

      - uses: dtolnay/rust-toolchain@stable
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Build wasm (release)
        run: cargo build --release -p fountouki --target wasm32-unknown-unknown

      # Assemble the static site: web shell + the macroquad js loader + the
      # freshly built wasm. manifest/icons are copied only if present.
      - name: Assemble dist/
        run: |
          mkdir -p dist
          cp web/index.html dist/
          cp web/mq_js_bundle.js dist/
          [ -f web/manifest.webmanifest ] && cp web/manifest.webmanifest dist/ || true
          cp web/icon* dist/ 2>/dev/null || true
          cp target/wasm32-unknown-unknown/release/fountouki.wasm dist/fountouki.wasm

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
