name: CI

# PR-only: the `pull_request` event already covers every branch with an open
# PR (and tests the merged result). A separate `push` trigger would re-run the
# identical job on the same branch — two checks per push. Concurrency cancels a
# superseded run when a PR branch is pushed again.
on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # macroquad's native (winit/glutin/alsa) deps + xvfb for a headless GL
      # context. The playtests/goldens run the real renderer offscreen.
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev pkg-config xvfb \
            imagemagick

      - uses: dtolnay/rust-toolchain@stable
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # Lint gate: the tree must be clippy-clean (warnings are errors).
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Pure-logic core tests (~120) + any app unit tests.
      - name: Test workspace
        run: cargo test --workspace

      # Scripted gameplay assertions. Needs a virtual display + software GL
      # because there's no GPU on the runner.
      - name: Playtest
        run: LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a cargo run -p fountouki -- --playtest

      # Golden screenshot matrix (offscreen render-target -> PNG via the same
      # renderer that ships). Uploaded so layout regressions can be eyeballed.
      - name: Golden screenshots
        run: LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a bash tools/goldens.sh

      # Visual regression gate: fresh renders vs the committed baselines in
      # tests/golden-baseline/ (fuzz absorbs AA jitter). Intentional change?
      # Refresh the baselines in the same PR — see tools/golden-diff.sh.
      - name: Golden diff vs baselines
        run: bash tools/golden-diff.sh

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: screenshots
          path: |
            screenshots/golden
            screenshots/golden-diff
          retention-days: 14

      # Make sure the wasm build (the actual deploy target) still links.
      - name: WASM build check
        run: cargo build --release -p fountouki --target wasm32-unknown-unknown
