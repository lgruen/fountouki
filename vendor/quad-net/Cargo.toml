# Trimmed in-tree fork of quad-net 0.1.2, pulled in via the workspace root's
# [patch.crates.io]. We only use `http_request`; upstream's native websocket
# modules drag in `qws -> url 1.7.2 -> idna 0.1.5` (RUSTSEC-2024-0421). Dropping
# them lets us drop `qws`/`url 1.7.2`/`idna 0.1.5` from the lockfile. Version
# must stay 0.1.2 so it satisfies the `quad-net = "0.1"` requirement as a patch.
[package]
name = "quad-net"
version = "0.1.2"
edition = "2018"
authors = ["Fedor Logachev <not.fl3@gmail.com>"]
license = "MIT/Apache-2.0"
description = "Miniquad friendly network abstractions (trimmed: http_request only)"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ureq = "2.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
sapp-jsutils = "0.1"
